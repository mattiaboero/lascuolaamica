name: Bug report
about: Segnala un problema tecnico o contenutistico
labels: ["bug"]
body:
  - type: textarea
    id: descrizione
    attributes:
      label: Descrizione del problema
      placeholder: Cosa succede e cosa ti aspettavi?
    validations:
      required: true

  - type: input
    id: pagina
    attributes:
      label: Pagina coinvolta
      placeholder: es. matematica.html

  - type: input
    id: browser
    attributes:
      label: Browser e versione
      placeholder: es. Chrome 135 / Safari 18

  - type: textarea
    id: step
    attributes:
      label: Passi per riprodurre
      placeholder: |
        1. Vai su...
        2. Clicca...
        3. Osserva...

  - type: textarea
    id: note
    attributes:
      label: Note aggiuntive
