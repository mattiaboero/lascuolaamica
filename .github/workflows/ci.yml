name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  prepublish-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure script is executable
        run: chmod +x prepublish-check.sh

      - name: Run prepublish checks
        run: ./prepublish-check.sh
